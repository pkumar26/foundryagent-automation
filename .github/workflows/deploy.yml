name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      infra_tool:
        description: "Infrastructure tool"
        required: true
        type: choice
        options:
          - terraform
          - bicep
      use_existing_foundry:
        description: "Use existing Foundry project"
        type: choice
        options:
          - "true"
          - "false"
        default: "true"
      agent_target:
        description: "Agent to deploy (name or 'all')"
        type: string
        default: "all"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ENVIRONMENT: ${{ inputs.environment }}
      INFRA_TOOL: ${{ inputs.infra_tool }}
      USE_EXISTING_FOUNDRY: ${{ inputs.use_existing_foundry || 'true' }}
      AGENT_TARGET: ${{ inputs.agent_target || 'all' }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      # Stage 1: Validate inputs
      - name: Validate agent target
        run: |
          if [ "$AGENT_TARGET" != "all" ]; then
            python -c "
          import os, sys
          from agents.registry import REGISTRY
          target = os.environ['AGENT_TARGET']
          try:
              REGISTRY.get_agent(target)
              print(f'[validate] Agent {target!r} found in registry')
          except KeyError as e:
              print(f'[validate] \u2717 {e}', file=sys.stderr)
              sys.exit(1)
          "
          else
            echo "[validate] Deploying all agents"
          fi

      # Compute the uppercase environment suffix for per-env secrets
      - name: Resolve environment suffix
        id: env-suffix
        run: echo "suffix=$(echo '${{ inputs.environment }}' | tr '[:lower:]' '[:upper:]')" >> "$GITHUB_OUTPUT"

      # Stage 2-3: Azure login via OIDC
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets[format('AZURE_CLIENT_ID_{0}', steps.env-suffix.outputs.suffix)] }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Stage 2: Provision shared infrastructure (Terraform)
      - name: Set up Terraform
        if: env.INFRA_TOOL == 'terraform'
        uses: hashicorp/setup-terraform@v3

      - name: Provision shared infra (Terraform)
        if: env.INFRA_TOOL == 'terraform'
        working-directory: infra/terraform
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets[format('AZURE_CLIENT_ID_{0}', steps.env-suffix.outputs.suffix)] }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=foundryagent-${{ env.ENVIRONMENT }}.tfstate"
          terraform apply -auto-approve -var-file=envs/${{ env.ENVIRONMENT }}.tfvars

      # Stage 2: Provision shared infrastructure (Bicep)
      - name: Resolve Bicep region
        if: env.INFRA_TOOL == 'bicep'
        id: bicep-region
        run: |
          PARAM_FILE="infra/bicep/parameters/${{ env.ENVIRONMENT }}.bicepparam"
          if [ ! -f "$PARAM_FILE" ]; then
            echo "::error::Parameter file not found: $PARAM_FILE"
            exit 1
          fi
          REGION=$(grep -oP "param location = '\K[^']+" "$PARAM_FILE")
          if [ -z "$REGION" ]; then
            echo "::error::Could not extract location from $PARAM_FILE"
            exit 1
          fi
          echo "region=${REGION}" >> "$GITHUB_OUTPUT"

      - name: Provision shared infra (Bicep)
        if: env.INFRA_TOOL == 'bicep'
        id: deploy-bicep
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: ${{ steps.bicep-region.outputs.region }}
          template: infra/bicep/main.bicep
          parameters: infra/bicep/parameters/${{ env.ENVIRONMENT }}.bicepparam

      # Stage 3: Foundry provisioning handled within main.tf/main.bicep via use_existing_foundry flag

      # Stage 4: Export outputs
      - name: Set connection string from secret (existing Foundry)
        if: env.USE_EXISTING_FOUNDRY == 'true'
        run: echo "FOUNDRY_PROJECT_CONNECTION_STRING=${{ secrets.FOUNDRY_PROJECT_CONNECTION_STRING }}" >> $GITHUB_ENV

      - name: Set connection string from Terraform output (new Foundry)
        if: env.USE_EXISTING_FOUNDRY == 'false' && env.INFRA_TOOL == 'terraform'
        working-directory: infra/terraform
        run: |
          CONN_STR=$(terraform output -raw project_connection_string)
          echo "FOUNDRY_PROJECT_CONNECTION_STRING=${CONN_STR}" >> $GITHUB_ENV

      - name: Set connection string from Bicep output (new Foundry)
        if: env.USE_EXISTING_FOUNDRY == 'false' && env.INFRA_TOOL == 'bicep'
        run: |
          echo "FOUNDRY_PROJECT_CONNECTION_STRING=${{ steps.deploy-bicep.outputs.projectConnectionString }}" >> $GITHUB_ENV

      # Stage 5: Deploy agents
      - name: Deploy agents
        env:
          FOUNDRY_PROJECT_CONNECTION_STRING: ${{ env.FOUNDRY_PROJECT_CONNECTION_STRING }}
        run: |
          if [ "$AGENT_TARGET" = "all" ]; then
            python scripts/deploy_agent.py --all
          else
            python scripts/deploy_agent.py --agent "$AGENT_TARGET"
          fi

      # Stage 6: Integration tests
      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run integration tests
        env:
          FOUNDRY_PROJECT_CONNECTION_STRING: ${{ env.FOUNDRY_PROJECT_CONNECTION_STRING }}
        run: pytest tests/ -m integration -v
