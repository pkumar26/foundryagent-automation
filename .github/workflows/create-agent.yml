name: Create Agent

on:
  workflow_dispatch:
    inputs:
      agent_name:
        description: "Agent name in kebab-case (e.g., my-agent)"
        required: true
        type: string
      model:
        description: "Model name for the agent"
        required: false
        default: "gpt-4o"
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  scaffold-agent:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AGENT_NAME: ${{ inputs.agent_name }}
      AGENT_MODEL: ${{ inputs.model }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install project
        run: uv sync

      - name: Validate agent name
        run: |
          uv run python -c "
          import os, sys
          from scripts.create_agent import validate_name
          name = os.environ['AGENT_NAME']
          err = validate_name(name)
          if err:
              print(f'[validate] \u2717 {err}', file=sys.stderr)
              sys.exit(1)
          print(f'[validate] Agent name {name!r} is valid')
          "

      - name: Run scaffolding script
        run: uv run python scripts/create_agent.py --name "$AGENT_NAME" --model "$AGENT_MODEL"

      - name: Create branch and commit
        run: |
          BRANCH_NAME="scaffold/$AGENT_NAME"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete remote branch if it exists (from a previous failed run)
          git push origin --delete "$BRANCH_NAME" 2>/dev/null || true

          git checkout -b "$BRANCH_NAME"
          git add .
          git commit -m "feat: scaffold agent $AGENT_NAME"
          git push origin "$BRANCH_NAME"

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "feat: add agent $AGENT_NAME" \
            --body "## New Agent: $AGENT_NAME

          Scaffolded via GitHub Actions workflow.

          ### Generated Files
          - \`agents/$AGENT_NAME/\` — agent code
          - \`tests/$AGENT_NAME/\` — test stubs
          - \`agents/registry.py\` — updated with new entry

          ### Next Steps
          1. Review and customise \`instructions.md\`
          2. Add custom tools
          3. Merge when ready" \
            --base main
